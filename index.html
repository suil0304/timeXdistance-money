<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Time X Distance = Money</title>
        <link rel="stylesheet" href="./css/main.css">
    </head>
    <body>
        <main class="main-font ali-center">
            <div id="map" style="width:50vh; height:50vh;"></div>
            <div id="app">
                <div id="sidebar">
                    <h2>경로 및 비용 계산</h2>
                    <input type="text" class="inputs" id="start" placeholder="출발지 입력">
                    <input type="text" class="inputs" id="goal" placeholder="목적지 입력">
                    <button class="inputs" onclick="calculateRoute()">경로 찾기</button>
                    
                    <div id="result-panel">
                        <p>거리: <span id="distance">-</span> km</p>
                        <p>통행료: <span id="toll">-</span> 원</p>
                        <p><strong>총 왕복비: <span id="total-cost">-</span> 원</strong></p>
                    </div>
                </div>
            </div>
        </main>
        <script>
            if(window.location == "https://time-x-distance-money.vercel.app/") {
                location.href = "https://suil0304.github.io/timeXdistance-money/";
            }
        </script>
        <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=aa9ce89b512353090cc402c040c121ae&libraries=services"></script>
        <script src="./js/map.js"></script>
    </body>
</html>
